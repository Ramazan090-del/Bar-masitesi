<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Shall We Make Up?</title>
    
    <meta property="og:title" content="Shall We Make Up?" />
    <meta property="og:description" content="Please take a look..." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://ramazan090-del.github.io/Bar-masitesi/barisma.html" />

    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #ffe6e6;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            text-align: center;
        }

        /* Sinematik Giriş Perde Grafiği */
        .perde-katmani {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #d63031;
            z-index: 99999;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: perdeAcilma 1.4s cubic-bezier(0.77, 0, 0.175, 1) forwards;
            pointer-events: none;
        }

        @keyframes perdeAcilma {
            0% { transform: scaleX(1); opacity: 1; }
            60% { opacity: 1; }
            100% { transform: scaleX(0); opacity: 0; display: none; }
        }

        .container {
            max-width: 600px;
            padding: 20px;
            z-index: 10;
        }

        h1 {
            color: #d63031;
            font-size: 2.5rem;
            margin-bottom: 20px;
            min-height: 4rem; /* Yazı yazılırken alanın kaymaması için */
        }

        .buttons {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-top: 20px;
            min-height: 150px;
            position: relative;
        }

        button {
            font-weight: bold;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: padding 0.2s ease, font-size 0.2s ease;
        }

        #btn-evet {
            background-color: #2ecc71;
            color: white;
            padding: 20px 40px;
            font-size: 1.8rem;
            z-index: 20;
        }

        #btn-hayir {
            background-color: #e74c3c;
            color: white;
            padding: 10px 20px;
            font-size: 1rem;
            max-width: 300px;
            line-height: 1.4;
            z-index: 30;
        }

        .full-screen-btn {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100vw !important;
            height: 100vh !important;
            font-size: 8rem !important;
            border-radius: 0 !important;
            z-index: 9999 !important;
            display: flex !important;
            justify-content: center !important;
            align-items: center !important;
        }

        .gif-container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            margin-bottom: 10px;
        }

        .gif-container img {
            width: 220px;
            height: auto;
            object-fit: contain;
        }

        .hidden {
            display: none !important;
        }

        .ortadaki-kutu-alani {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-top: 15px;
            position: relative;
            width: 100%;
        }

        .surpriz-kutusu {
            font-size: 3rem;
            cursor: pointer;
            user-select: none;
            margin-top: 10px;
        }

        .kutu-mesaji {
            background: white;
            color: #d63031;
            padding: 12px 20px;
            border-radius: 12px;
            display: none;
            border: 2px solid #d63031;
            font-weight: bold;
            font-size: 1.1rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 90%;
            margin-bottom: 15px;
            word-wrap: break-word;
            white-space: pre-wrap; 
        }
    </style>
</head>
<body>

    <div class="perde-katmani"></div>

    <audio id="arkaPlanMuzik" src="art-deco.mp3" preload="auto"></audio>

    <div id="soru-ekrani" class="container">
        <h1 id="ana-baslik"></h1> <div class="buttons">
            <button id="btn-evet" onclick="evetTiklandi()">Yes</button>
            <button id="btn-hayir" onclick="hayirTiklandi()">No</button>
        </div>

        <div class="gif-container">
            <img id="ana-animasyon" src="Giri%C5%9F.gif" alt="Animation">
        </div>
    </div>

    <div id="basari-ekrani" class="container hidden">
        <h1 id="basari-baslik" style="color: #2ecc71; font-size: 2.5rem; white-space: pre-line;"></h1> <div class="gif-container">
            <img src="Son%20giri%C5%9F.gif" alt="Happy End">
        </div>

        <div class="ortadaki-kutu-alani">
            <div id="kutu-metni" class="kutu-mesaji"></div>
            <div class="surpriz-kutusu" onclick="yaziEfektiBaslat()">🎁</div>
        </div>
    </div>

    <script>
        let tiklamaSayisi = 0;
        let evetPaddingX = 40;
        let evetPaddingY = 20;
        let evetFontSize = 1.8;
        
        // Metinler
        const baslikMetni = "Shall We Make Up?";
        const basariMetni = "I knew you would say yes!\nThank you";
        const tamMetin = "Can we follow each other again, Zilan?";
        
        const hayirYazilari = [
            "Are you sure?",
            "Are you really sure??",
            "Can you say you are absolutely sure?",
            "Please think about it once more!",
            "I'll be very sad if you say no...",
            "I'll be really sad...",
            "I'll be very, very sad...",
            "Okay fine, I won't ask anymore..."
        ];

        // Genel harf harf yazdırma fonksiyonu
        function harfHarfYaz(elementId, metin, hiz, callback) {
            const element = document.getElementById(elementId);
            element.textContent = "";
            let i = 0;
            function yaz() {
                if (i < metin.length) {
                    element.textContent += metin.charAt(i);
                    i++;
                    setTimeout(yaz, hiz);
                } else if (callback) {
                    callback();
                }
            }
            yaz();
        }

        // Sayfa ilk yüklendiğinde ana başlığı yazdır
        window.onload = function() {
            setTimeout(() => {
                harfHarfYaz("ana-baslik", baslikMetni, 70);
            }, 600); // Perde açılırken yazmaya başlasın
        };

        // Kutucuğa basınca soruyu yazdıran fonksiyon
        let kutuZamanlayici;
        function yaziEfektiBaslat() {
            const kutuMetni = document.getElementById('kutu-metni');
            
            if (kutuMetni.style.display === 'block') {
                kutuMetni.style.display = 'none';
                kutuMetni.textContent = "";
                return;
            }

            kutuMetni.style.display = 'block';
            harfHarfYaz("kutu-metni", tamMetin, 50);
        }

        function hayirKacir() {
            const hayirButon = document.getElementById('btn-hayir');
            const evetButon = document.getElementById('btn-evet');
            
            if (tiklamaSayisi >= hayirYazilari.length) return;

            hayirButon.style.position = 'fixed';
            const evetRect = evetButon.getBoundingClientRect();
            let x, y, kesisiyorMu;

            do {
                x = Math.random() * (window.innerWidth - hayirButon.clientWidth - 40) + 20;
                y = Math.random() * (window.innerHeight - hayirButon.clientHeight - 40) + 20;

                kesisiyorMu = (
                    x < evetRect.right + 60 &&
                    x + hayirButon.clientWidth > evetRect.left - 60 &&
                    y < evetRect.bottom + 60 &&
                    y + hayirButon.clientHeight > evetRect.top - 60
                );
            } while (kesisiyorMu);

            hayirButon.style.left = x + "px";
            hayirButon.style.top = y + "px";
        }

        function hayirTiklandi() {
            tiklamaSayisi++;
            
            const anaGif = document.getElementById('ana-animasyon');
            const evetButon = document.getElementById('btn-evet');
            const hayirButon = document.getElementById('btn-hayir');

            if (tiklamaSayisi > hayirYazilari.length) {
                hayirButon.classList.add('hidden');
                evetButon.classList.add('full-screen-btn');
                return;
            }

            if (tiklamaSayisi % 2 !== 0) {
                anaGif.src = "%C3%87%C3%B6p%20kutusu.gif";
            } else {
                anaGif.src = "%C4%B0kinci%20%C3%87%C3%B6p%20kutusu.gif";
            }

            evetPaddingX += 35;
            evetPaddingY += 18;
            evetFontSize += 0.45;
            evetButon.style.padding = evetPaddingY + "px " + evetPaddingX + "px";
            evetButon.style.fontSize = evetFontSize + "rem";

            // No butonunun üzerindeki yeni metni de harf harf yazdırır
            harfHarfYaz("btn-hayir", hayirYazilari[tiklamaSayisi - 1], 30);

            hayirKacir();
        }

        function evetTiklandi() {
            document.getElementById('soru-ekrani').classList.add('hidden');
            document.getElementById('basari-ekrani').classList.remove('hidden');
            document.body.style.backgroundColor = "#e8f8f5";
            
            // Başarı ekranı açıldığında teşekkür yazısını otomatik harf harf yazar
            harfHarfYaz("basari-baslik", basariMetni, 60);

            const muzik = document.getElementById('arkaPlanMuzik');
            muzik.play().catch(error => {
                console.log("Müzik otomatik oynatılamadı, tarayıcı engeli: ", error);
            });

            setTimeout(() => {
                muzik.pause();
                muzik.currentTime = 0;
            }, 15000);
        }
    </script>
</body>
</html>
