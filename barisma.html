        body {

        /* Dokunma/Tıklama ile yayılan dalga grafiği */
        .dokunma-dalgasi {
            position: absolute;
            border: 2px solid rgba(214, 48, 49, 0.4);
            border-radius: 50%;
            background-color: rgba(255, 182, 193, 0.3);
            pointer-events: none;
            transform: translate(-50%, -50%);
            animation: dalgaGenisle 0.6s ease-out forwards;
            z-index: 999999;
        }

        @keyframes dalgaGenisle {
            0% { width: 0px; height: 0px; opacity: 1; }
            100% { width: 120px; height: 120px; opacity: 0; }
        }

        /* Sinematik Giriş Perde Grafiği */
        .perde-katmani {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #d63031;
            z-index: 99999;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: perdeAcilma 1.4s cubic-bezier(0.77, 0, 0.175, 1) forwards;
            pointer-events: none;
        }

        @keyframes perdeAcilma {
            0% { transform: scaleX(1); opacity: 1; }
            60% { opacity: 1; }
            100% { transform: scaleX(0); opacity: 0; display: none; }
        }
