<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Can We Start Talking Again, Shall We Make Up?</title>
    
    <meta property="og:title" content="Can We Start Talking Again, Shall We Make Up?" />
    <meta property="og:description" content="Please take a look..." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://ramazan090-del.github.io/Bar-masitesi/barisma.html" />

    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #ffe6e6;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            text-align: center;
            transition: background-color 0.5s ease;
        }

        .container {
            max-width: 600px;
            padding: 20px;
            z-index: 10;
        }

        h1 {
            color: #d63031;
            font-size: 2.2rem;
            margin-bottom: 20px;
        }

        .buttons {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-top: 20px;
            min-height: 150px;
            position: relative;
        }

        button {
            font-weight: bold;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: padding 0.2s ease, font-size 0.2s ease;
        }

        #btn-evet {
            background-color: #2ecc71;
            color: white;
            padding: 20px 40px;
            font-size: 1.8rem;
            z-index: 20;
        }

        #btn-hayir {
            background-color: #e74c3c;
            color: white;
            padding: 10px 20px;
            font-size: 1rem;
            max-width: 300px;
            line-height: 1.4;
            z-index: 30;
        }

        .full-screen-btn {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100vw !important;
            height: 100vh !important;
            font-size: 8rem !important;
            border-radius: 0 !important;
            z-index: 9999 !important;
            display: flex !important;
            justify-content: center !important;
            align-items: center !important;
        }

        .gif-container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            margin-bottom: 10px;
        }

        .gif-container img {
            width: 220px;
            height: auto;
            object-fit: contain;
        }

        .hidden {
            display: none !important;
        }

        /* Sağ Alttaki Sürpriz Kutu Tasarımı */
        .surpriz-kutusu {
            position: fixed;
            bottom: 20px;
            right: 20px;
            font-size: 2.5rem;
            cursor: pointer;
            z-index: 1000;
            user-select: none;
            transition: transform 0.3s ease;
            animation: hafifYayla 2s infinite ease-in-out;
        }

        .surpriz-kutusu:hover {
            transform: scale(1.2);
        }

        /* Kutunun içinden çıkan mesaj balonu */
        .kutu-mesaji {
            position: absolute;
            bottom: 60px;
            right: 0;
            background-color: #ffffff;
            color: #d63031;
            font-weight: bold;
            font-size: 1rem;
            padding: 12px 18px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            white-space: nowrap;
            border: 2px solid #ffb3b3;
            transition: opacity 0.3s ease, transform 0.3s ease;
            transform: translateY(10px);
            opacity: 0;
            pointer-events: none;
        }

        .kutu-mesaji.goster {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        @keyframes hafifYayla {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
    </style>
</head>
<body>

    <div id="soru-ekrani" class="container">
        <h1>Can We Start Talking Again,<br>Shall We Make Up?</h1>
        
        <div class="buttons">
            <button id="btn-evet" onclick="evetTiklandi()">Yes</button>
            <button id="btn-hayir" onclick="hayirTiklandi()">No</button>
        </div>

        <div class="gif-container">
            <img id="ana-animasyon" src="Giri%C5%9F.gif" alt="Animation">
        </div>
    </div>

    <!-- Başarı ekranında teşekkürlerin yanına Zilan eklendi -->
    <div id="basari-ekrani" class="container hidden">
        <h1 style="color: #2ecc71; font-size: 2.5rem;">I knew you would say yes!<br>Thank you, Zilan</h1>
        <div class="gif-container">
            <img src="Son%20giri%C5%9F.gif" alt="Happy End">
        </div>
    </div>

    <!-- Sağ Alt Köşedeki Sürpriz Kutu Yapısı -->
    <div class="surpriz-kutusu" onclick="kutuAc()">
        <span id="kutu-emoji">🎁</span>
        <div id="kutu-metni" class="kutu-mesaji">Can We Follow Each Other Again?</div>
    </div>

    <script>
        let tiklamaSayisi = 0;
        let evetPaddingX = 40;
        let evetPaddingY = 20;
        let evetFontSize = 1.8;
        
        const hayirYazilari = [
            "Are you sure?",
            "Are you really sure??",
            "Can you say you are absolutely sure?",
            "Please think about it once more!",
            "I'll be very sad if you say no...",
            "I'll be really sad...",
            "I'll be very, very sad...",
            "Okay fine, I won't ask anymore..."
        ];

        // Sürpriz kutuyu açıp kapatan fonksiyon
        function kutuAc() {
            const mesaj = document.getElementById('kutu-metni');
            const emoji = document.getElementById('kutu-emoji');
            
            if (mesaj.classList.contains('goster')) {
                mesaj.classList.remove('goster');
                emoji.innerText = "🎁";
            } else {
                mesaj.classList.add('goster');
                emoji.innerText = "💝";
            }
        }

        function hayirKacir() {
            const hayirButon = document.getElementById('btn-hayir');
            const evetButon = document.getElementById('btn-evet');
            
            if (tiklamaSayisi >= hayirYazilari.length) return;

            hayirButon.style.position = 'fixed';

            const evetRect = evetButon.getBoundingClientRect();
            let x, y, kesisiyorMu;

            do {
                x = Math.random() * (window.innerWidth - hayirButon.clientWidth - 40) + 20;
                y = Math.random() * (window.innerHeight - hayirButon.clientHeight - 40) + 20;

                kesisiyorMu = (
                    x < evetRect.right + 60 &&
                    x + hayirButon.clientWidth > evetRect.left - 60 &&
                    y < evetRect.bottom + 60 &&
                    y + hayirButon.clientHeight > evetRect.top - 60
                );
            } while (kesisiyorMu);

            hayirButon.style.left = x + "px";
            hayirButon.style.top = y + "px";
        }

        function hayirTiklandi() {
            tiklamaSayisi++;
            
            const anaGif = document.getElementById('ana-animasyon');
            const evetButon = document.getElementById('btn-evet');
            const hayirButon = document.getElementById('btn-hayir');

            if (tiklamaSayisi > hayirYazilari.length) {
                hayirButon.classList.add('hidden');
                evetButon.classList.add('full-screen-btn');
                return;
            }

            if (tiklamaSayisi % 2 !== 0) {
                anaGif.src = "%C3%87%C3%B6p%20kutusu.gif";
            } else {
                anaGif.src = "%C4%B0kinci%20%C3%87%C3%B6p%20kutusu.gif";
            }

            evetPaddingX += 35;
            evetPaddingY += 18;
            evetFontSize += 0.45;
            evetButon.style.padding = evetPaddingY + "px " + evetPaddingX + "px";
            evetButon.style.fontSize = evetFontSize + "rem";

            hayirButon.innerText = hayirYazilari[tiklamaSayisi - 1];

            hayirKacir();
        }

        function evetTiklandi() {
            document.getElementById('soru-ekrani').classList.add('hidden');
            document.getElementById('basari-ekrani').classList.remove('hidden');
            document.body.style.backgroundColor = "#e8f8f5";
        }
    </script>
</body>
</html>
