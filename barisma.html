<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Shall We Make Up?</title>
    
    <meta property="og:title" content="Shall We Make Up?" />
    <meta property="og:description" content="Please take a look..." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://ramazan090-del.github.io/Bar-masitesi/barisma.html" />

    <style>
        * { box-sizing: border-box; }

        body {
            margin: 0; padding: 0;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; background-color: #ffe6e6;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; text-align: center; position: relative;
            transition: background-color 1s ease;
        }

        .dokunma-dalgasi {
            position: absolute; border: 2px solid rgba(214, 48, 49, 0.4);
            border-radius: 50%; background-color: rgba(255, 182, 193, 0.3);
            pointer-events: none; transform: translate(-50%, -50%);
            animation: dalgaGenisle 0.6s ease-out forwards; z-index: 999999;
        }

        @keyframes dalgaGenisle {
            0% { width: 0px; height: 0px; opacity: 1; }
            100% { width: 120px; height: 120px; opacity: 0; }
        }

        /* GERÇEKÇİ KADİFE PERDE SİSTEMİ */
        .perde-kutusu {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 99999; pointer-events: none; display: flex;
        }

        .perde-kanat {
            width: 50vw; height: 100vh;
            background: linear-gradient(90deg, 
                #4a0000 0%, #8b0000 20%, #4a0000 40%, 
                #8b0000 60%, #5c0000 80%, #2a0000 100%);
            box-shadow: inset 0 0 80px rgba(0,0,0,0.8);
        }

        .sol-perde {
            transform-origin: left center;
            animation: solPerdeAcilma 2.5s cubic-bezier(0.4, 0, 0.2, 1) 3s forwards;
        }

        .sag-perde {
            transform-origin: right center;
            animation: sagPerdeAcilma 2.5s cubic-bezier(0.4, 0, 0.2, 1) 3s forwards;
        }

        @keyframes solPerdeAcilma {
            0% { transform: scaleX(1); opacity: 1; }
            100% { transform: scaleX(0); opacity: 0; }
        }

        @keyframes sagPerdeAcilma {
            0% { transform: scaleX(1); opacity: 1; }
            100% { transform: scaleX(0); opacity: 0; }
        }

        .container { max-width: 600px; padding: 20px; z-index: 10; }

        h1 { color: #d63031; font-size: 2.5rem; margin-bottom: 20px; min-height: 4rem; }

        .buttons {
            display: flex; justify-content: center; align-items: center;
            gap: 20px; margin-top: 20px; min-height: 150px; position: relative;
        }

        button { font-weight: bold; border: none; border-radius: 5px; cursor: pointer; transition: padding 0.2s ease, font-size 0.2s ease; }

        #btn-evet {
            background-color: #2ecc71; color: white; padding: 20px 40px; font-size: 1.8rem; z-index: 20;
            animation: butonNabiz 1.5s infinite ease-in-out;
        }

        @keyframes butonNabiz {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(46, 204, 113, 0.4); }
            50% { transform: scale(1.04); box-shadow: 0 0 0 12px rgba(46, 204, 113, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(46, 204, 113, 0); }
        }

        #btn-hayir {
            background-color: #e74c3c; color: white; padding: 10px 20px; font-size: 1rem;
            max-width: 300px; line-height: 1.4; z-index: 30;
            /* Videodaki gibi akıcı kayarak kaçması için transition ekledik */
            transition: left 0.15s cubic-bezier(0.25, 0.8, 0.25, 1), top 0.15s cubic-bezier(0.25, 0.8, 0.25, 1), padding 0.2s ease, font-size 0.2s ease;
        }

        .full-screen-btn {
            position: fixed !important; top: 0 !important; left: 0 !important;
            width: 100vw !important; height: 100vh !important; font-size: 8rem !important;
            border-radius: 0 !important; z-index: 9999 !important;
            display: flex !important; justify-content: center !important; align-items: center !important;
        }

        .gif-container { display: flex; justify-content: center; align-items: center; width: 100%; margin-bottom: 10px; }
        .gif-container img { width: 220px; height: auto; object-fit: contain; }
        .hidden { display: none !important; }
        
        .ortadaki-kutu-alani { display: flex; flex-direction: column; align-items: center; justify-content: center; margin-top: 15px; position: relative; width: 100%; }
        
        .kutu-mesaji {
            background: white; color: #d63031; padding: 12px 20px; border-radius: 12px;
            display: none; border: 2px solid #d63031; font-weight: bold; font-size: 1.1rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 90%; margin-bottom: 15px;
            word-wrap: break-word; white-space: pre-wrap;
        }
    </style>
</head>
<body>

    <div class="perde-kutusu">
        <div class="perde-kanat sol-perde"></div>
        <div class="perde-kanat sag-perde"></div>
    </div>

    <div id="soru-ekrani" class="container">
        <h1 id="ana-baslik"></h1>
        <div class="buttons">
            <button id="btn-evet" onclick="evetTiklandi()">Yes</button>
            <button id="btn-hayir" onclick="hayirTiklandi()">No</button>
        </div>
        <div class="gif-container"><img id="ana-animasyon" src="Giri%C5%9F.gif" alt="Animation"></div>
    </div>

    <div id="basari-ekrani" class="container hidden">
        <h1 id="basari-baslik" style="color: #2ecc71; font-size: 2.5rem; white-space: pre-line;"></h1>
        <div class="gif-container"><img src="Son%20giri%C5%9F.gif" alt="Happy End"></div>
        <div class="ortadaki-kutu-alani">
            <div class="kutu-mesaji" id="kutu-metni"></div>
            <div class="surpriz-kutusu" onclick="yaziEfektiBaslat()" style="font-size: 3rem; cursor: pointer; user-select: none; margin-top: 10px;">🎁</div>
        </div>
    </div>

    <script>
        let tiklamaSayisi = 0; 
        let evetPaddingX = 40; 
        let evetPaddingY = 20; 
        let evetFontSize = 1.8;
        
        const baslikMetni = "Shall We Make Up?";
        const basariMetni = "I knew you would say yes!\nThank you";
        const tamMetin = "Can we follow each other again, Zilan?";
        
        const hayirYazilari = [
            "Are you sure?",
            "Are you really sure??",
            "Can you say you are absolutely sure?",
            "Please think about it once more!",
            "I'll be very sad if you say no...",
            "I'll be really sad...",
            "I'll be very, very sad...",
            "Okay fine, I won't ask anymore..."
        ];

        window.onload = function() {
            setTimeout(() => {
                harfHarfYaz("ana-baslik", baslikMetni, 70);
            }, 5700);
        };

        function harfHarfYaz(elementId, metin, hiz, callback) {
            const element = document.getElementById(elementId);
            if(!element) return;
            element.textContent = ""; 
            let i = 0;
            function yaz() {
                if (i < metin.length) { 
                    element.textContent += metin.charAt(i); 
                    i++; 
                    setTimeout(yaz, hiz); 
                } else if (callback) {
                    callback();
                }
            }
            yaz();
        }

        window.addEventListener('click', function(e) {
            const dalga = document.createElement('div'); dalga.classList.add('dokunma-dalgasi');
            dalga.style.left = e.pageX + 'px'; dalga.style.top = e.pageY + 'px';
            document.body.appendChild(dalga); setTimeout(() => { dalga.remove(); }, 600);
        });

        function yaziEfektiBaslat() {
            const kutuMetni = document.getElementById('kutu-metni');
            if (kutuMetni.style.display === 'block') { 
                kutuMetni.style.display = 'none'; 
                kutuMetni.textContent = "";
                return; 
            }
            kutuMetni.style.display = 'block';
            harfHarfYaz("kutu-metni", tamMetin, 50);
        }

        function hayirKacir() {
            const hayirButon = document.getElementById('btn-hayir');
            const evetButon = document.getElementById('btn-evet');
            
            if (tiklamaSayisi >= hayirYazilari.length) return;

            hayirButon.style.position = 'fixed';
            const evetRect = evetButon.getBoundingClientRect();
            let x, y, kesisiyorMu;

            do {
                x = Math.random() * (window.innerWidth - hayirButon.clientWidth - 40) + 20;
                y = Math.random() * (window.innerHeight - hayirButon.clientHeight - 40) + 20;

                kesisiyorMu = (
                    x < evetRect.right + 60 &&
                    x + hayirButon.clientWidth > evetRect.left - 60 &&
                    y < evetRect.bottom + 60 &&
                    y + hayirButon.clientHeight > evetRect.top - 60
                );
            } while (kesisiyorMu);

            hayirButon.style.left = x + "px";
            hayirButon.style.top = y + "px";
        }

        function hayirTiklandi() {
            tiklamaSayisi++; 
            const anaGif = document.getElementById('ana-animasyon');
            const evetButon = document.getElementById('btn-evet');
            const hayirButon = document.getElementById('btn-hayir');

            if (tiklamaSayisi > hayirYazilari.length) {
                hayirButon.classList.add('hidden');
                evetButon.classList.add('full-screen-btn');
                return;
            }

            if (tiklamaSayisi % 2 !== 0) {
                anaGif.src = "%C3%87%C3%B6p%20kutusu.gif";
            } else {
                anaGif.src = "%C4%B0kinci%20%C3%87%C3%B6p%20kutusu.gif";
            }

            evetPaddingX += 35; evetPaddingY += 18; evetFontSize += 0.45;
            evetButon.style.padding = evetPaddingY + "px " + evetPaddingX + "px";
            evetButon.style.fontSize = evetFontSize + "rem";

            harfHarfYaz("btn-hayir", hayirYazilari[tiklamaSayisi - 1], 30);
            hayirKacir();
        }

        function evetTiklandi() {
            document.getElementById('soru-ekrani').classList.add('hidden');
            document.getElementById('basari-ekrani').classList.remove('hidden');
            document.body.style.backgroundColor = "#e8f8f5";
            harfHarfYaz("basari-baslik", basariMetni, 60);
        }

        // --- ENTEGRE EDİLEN 4 KEZ KAÇIŞ SİSTEMİ (Orijinal koda asla zarar vermez) ---
        let hoverEscapeCount = 0;
        const hayirButonEl = document.getElementById('btn-hayir');
        const evetButonEl = document.getElementById('btn-evet');

        function hoverKacis(e) {
            if (hoverEscapeCount < 4) {
                if (e) {
                    e.preventDefault();
                    e.stopPropagation();
                }

                hayirButonEl.style.position = 'fixed';
                const evetRect = evetButonEl.getBoundingClientRect();
                let x, y, kesisiyorMu;
                let denemeSayisi = 0;

                // "Evet" butonunun tam üzerine gitmesini kesinlikle engelleyen döngü
                do {
                    x = Math.random() * (window.innerWidth - hayirButonEl.clientWidth - 40) + 20;
                    y = Math.random() * (window.innerHeight - hayirButonEl.clientHeight - 40) + 20;

                    // Evet butonu ile çakışma (veya çok yaklaşma) kontrolü
                    kesisiyorMu = (
                        x < evetRect.right + 60 &&
                        x + hayirButonEl.clientWidth > evetRect.left - 60 &&
                        y < evetRect.bottom + 60 &&
                        y + hayirButonEl.clientHeight > evetRect.top - 60
                    );
                    denemeSayisi++;
                } while (kesisiyorMu && denemeSayisi < 150);

                hayirButonEl.style.left = x + "px";
                hayirButonEl.style.top = y + "px";
                
                hoverEscapeCount++;
            }
        }

        // Fare yaklaştığında veya mobilde parmak dokunduğunda kaçırma tetikleyicileri
        hayirButonEl.addEventListener('mouseover', hoverKacis);
        hayirButonEl.addEventListener('touchstart', hoverKacis, { passive: false });

        // Kullanıcı çok hızlı basarsa click olayını havada yakalayıp 4 kaçış bitmeden eski kodunun çalışmasını kilitler.
        hayirButonEl.addEventListener('click', function(e) {
            if (hoverEscapeCount < 4) {
                e.preventDefault();
                e.stopPropagation();
                hoverKacis(e);
            }
        }, true); // 'true' (capturing phase) sayesinde eski click fonksiyonundan daha önce çalışır.
    </script>
</body>
</html>
