<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beni Affet :( (YENI SÜRÜM)</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #ffe6e6;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            text-align: center;
        }

        .container {
            max-width: 600px;
            padding: 20px;
            z-index: 10;
        }

        h1 {
            color: #d63031;
            font-size: 2rem;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }

        .buttons {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-top: 30px;
            min-height: 150px;
        }

        button {
            padding: 15px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s ease, font-size 0.2s ease;
        }

        #btn-evet {
            background-color: #2ecc71;
            color: white;
        }

        #btn-hayir {
            background-color: #e74c3c;
            color: white;
            position: relative;
        }

        .gif-container img {
            width: 200px;
            height: 200px;
            object-fit: cover;
            border-radius: 50%;
            margin-bottom: 20px;
        }

        /* Başarı ekranı */
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <!-- Soru Ekranı -->
    <div id="soru-ekrani" class="container">
        <div class="gif-container">
            <!-- Koda gömülü, engellenmesi imkansız üzgün kedi görseli -->
            <img id="ana-gif" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='90'>🥺</text></svg>" alt="Üzgün Kedi">
        </div>
        <h1 id="mesaj">Seni Üzdüğüm İçin Özür Dilerim.<br>Barışalım Mı?</h1>
        
        <div class="buttons">
            <button id="btn-evet" onclick="evetTiklandi()">Evet</button>
            <button id="btn-hayir" onclick="hayirTiklandi()">Hayır</button>
        </div>
    </div>

    <!-- Başarı Ekranı -->
    <div id="basari-ekrani" class="container hidden">
        <div class="gif-container">
            <!-- Koda gömülü, engellenmesi imkansız mutlu sarılma/kalp görseli -->
            <img src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='90'>❤️</text></svg>" alt="Sarılma">
        </div>
        <h1 style="color: #2ecc71; font-size: 2.5rem;">Evet diyeceğini biliyordum!<br>Teşekkür Ederim ❤️</h1>
    </div>

    <script>
        let tiklamaSayisi = 0;
        let evetBoyutu = 1.2; // ilk font boyutu (rem)
        
        const mesajlar = [
            "Gerçekten emin misin?? 🥺",
            "Tam olarak emin olduğunu söyleyebilir misin? 💔",
            "Bir daha düşün lütfen! 😭",
            "Hayır dersen çok üzülürüm...",
            "Lütfen... Son şansın? 🙏",
            "Peki tamam, artık sormayacağım..."
        ];

        function hayirTiklandi() {
            tiklamaSayisi++;
            
            // Evet butonunu büyüt
            evetBoyutu += 0.5; 
            const evetButon = document.getElementById('btn-evet');
            evetButon.style.fontSize = evetBoyutu + "rem";
            evetButon.style.padding = (15 + tiklamaSayisi * 10) + "px " + (30 + tiklamaSayisi * 20) + "px";

            // Mesajı değiştir
            const mesajElementi = document.getElementById('mesaj');
            if(tiklamaSayisi <= mesajlar.length) {
                mesajElementi.innerText = mesajlar[tiklamaSayisi - 1];
            } else {
                // Hayır butonunu tamamen yok et, sadece devasa bir evet kalsın
                document.getElementById('btn-hayir').classList.add('hidden');
            }
        }

        function evetTiklandi() {
            // Soru ekranını gizle, başarı ekranını göster
            document.getElementById('soru-ekrani').classList.add('hidden');
            document.getElementById('basari-ekrani').classList.remove('hidden');
            document.body.style.backgroundColor = "#e8f8f5"; // Arka planı yumuşak bir yeşil yap
        }
    </script>
</body>
</html>
