<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beni Affet :(</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f4f8;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            text-align: center;
        }

        .container {
            max-width: 600px;
            padding: 20px;
            z-index: 10;
        }

        h1 {
            color: #d63031;
            font-size: 2.2rem;
            margin-bottom: 20px;
        }

        .buttons {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-top: 20px;
            min-height: 150px;
        }

        button {
            font-weight: bold;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        #btn-evet {
            background-color: #2ecc71;
            color: white;
            padding: 20px 40px;
            font-size: 1.8rem;
        }

        #btn-hayir {
            background-color: #e74c3c;
            color: white;
            padding: 10px 20px;
            font-size: 1rem;
        }

        .gif-container img {
            width: 220px;
            height: auto;
            margin-bottom: 10px;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <div id="soru-ekrani" class="container">
        <h1 id="mesaj">Seni Üzdüğüm İçin Özür Dilerim.<br>Barışalım Mı?</h1>
        
        <div class="buttons">
            <button id="btn-evet" onclick="evetTiklandi()">Evet</button>
            <button id="btn-hayir" onclick="hayirTiklandi()">Hayır</button>
        </div>

        <div class="gif-container">
            <img id="capoo-animation" src="https://cdna.artstation.com/p/assets/images/images/028/148/188/original/clover-fi-capoo-cry.gif" alt="Hareketli Mavi Capoo">
        </div>
    </div>

    <div id="basari-ekrani" class="container hidden">
        <h1 style="color: #2ecc71; font-size: 2.5rem;">Evet diyeceğini biliyordum!<br>Teşekkür Ederim ❤️</h1>
        <div class="gif-container">
            <img src="https://cdna.artstation.com/p/assets/images/images/028/148/182/original/clover-fi-capoo-heart.gif" alt="Mutlu Capoo">
        </div>
    </div>

    <script>
        let tiklamaSayisi = 0;
        let evetPaddingX = 40;
        let evetPaddingY = 20;
        let evetFontSize = 1.8;
        
        let hayirPaddingX = 20;
        let hayirPaddingY = 10;
        let hayirFontSize = 1;
        
        const mesajlar = [
            "Tam olarak emin olduğunu söyleyebilir misin? 💔",
            "Gerçekten emin misin?? 🥺",
            "Bir daha düşün lütfen! 😭",
            "Hayır dersen çok üzülürüm...",
            "Lütfen... Son şansın? 🙏",
            "Peki tamam, artık sormayacağım..."
        ];

        function hayirTiklandi() {
            tiklamaSayisi++;
            
            // Evet butonunu devasa yap
            evetPaddingX += 30;
            evetPaddingY += 15;
            evetFontSize += 0.4;
            const evetButon = document.getElementById('btn-evet');
            evetButon.style.padding = evetPaddingY + "px " + evetPaddingX + "px";
            evetButon.style.fontSize = evetFontSize + "rem";

            // Hayır butonunu küçült
            if (hayirFontSize > 0.4) {
                hayirPaddingX -= 2;
                hayirPaddingY -= 1;
                hayirFontSize -= 0.1;
                const hayirButon = document.getElementById('btn-hayir');
                hayirButon.style.padding = hayirPaddingY + "px " + hayirPaddingX + "px";
                hayirButon.style.fontSize = hayirFontSize + "rem";
            }

            // Üstteki kırmızı mesajı değiştir
            const mesajElementi = document.getElementById('mesaj');
            if(tiklamaSayisi <= mesajlar.length) {
                mesajElementi.innerText = mesajlar[tiklamaSayisi - 1];
            } else {
                document.getElementById('btn-hayir').classList.add('hidden');
            }
        }

        function evetTiklandi() {
            document.getElementById('soru-ekrani').classList.add('hidden');
            document.getElementById('basari-ekrani').classList.remove('hidden');
            document.body.style.backgroundColor = "#e8f8f5";
        }
    </script>
</body>
</html>
