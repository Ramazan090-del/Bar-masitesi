    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #ffe6e6;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            text-align: center;
            transition: background-color 0.5s ease;
        }

        .container {
            max-width: 600px;
            padding: 20px;
            z-index: 10;
        }

        h1 {
            color: #d63031;
            font-size: 2.2rem;
            margin-bottom: 20px;
        }

        .buttons {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-top: 20px;
            min-height: 150px;
        }

        button {
            font-weight: bold;
            border: none;
            border-radius: 5px;

        }

        #btn-evet {
            background-color: #2ecc71;
            color: white;
            padding: 20px 40px;

        }

        #btn-hayir {

            color: white;
            padding: 10px 20px;
            font-size: 1rem;
            max-width: 300px;
            line-height: 1.4;
        }

        .full-screen-btn {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100vw !important;
            height: 100vh !important;
            font-size: 8rem !important;
            border-radius: 0 !important;
            z-index: 9999 !important;
            display: flex !important;
            justify-content: center !important;
            align-items: center !important;
        }

        .gif-container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            margin-bottom: 10px;
        }

        .gif-container img {
            width: 220px;
            height: auto;
            object-fit: contain; /* Resmin kırpılmasını önler, çerçeveye sığdırır */
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>

        <div class="buttons">

        <div class="gif-container">

    <div id="basari-ekrani" class="container hidden">
